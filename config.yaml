# ============================================================
#  Love Island USA — Sentiment Tracker settings  (Season 8)
#  ------------------------------------------------------------
#  Plain text. Lines beginning with "#" are notes and ignored.
#  Keep the indentation (leading spaces) exactly as shown.
# ============================================================

show: "Love Island USA"
season: 8

# ------------------------------------------------------------
#  CAST ROSTER
#  canonical = official name shown in the dashboard.
#  aliases   = nicknames fans use, so comments tag correctly.
# ------------------------------------------------------------
entities:
  contestants:
    # — Girls —
    - canonical: "Aniya"
    - canonical: "Beatriz"
      aliases: ["Bea"]
    - canonical: "Kenzie"
    - canonical: "Melanie"
      aliases: ["Mel"]
    - canonical: "Trinity"
    - canonical: "Kayda"          # bombshell
    - canonical: "Jen"            # bombshell, currently single
    - canonical: "Sol"            # bombshell, currently single
    # — Boys —
    - canonical: "Bryce"
    - canonical: "KC"
    - canonical: "Sean"           # dumped — no longer in the villa
    - canonical: "Sincere"
    - canonical: "Zach"
    - canonical: "Gabriel"        # bombshell
    - canonical: "Corbin"         # bombshell
    - canonical: "Caleb"          # bombshell, currently single

  couples:
    # — Established couples —
    - canonical: "Aniya & KC"
      members: ["Aniya", "KC"]
    - canonical: "Beatriz & Gabriel"
      members: ["Beatriz", "Gabriel"]
    - canonical: "Kenzie & Corbin"
      members: ["Kenzie", "Corbin"]
    - canonical: "Melanie & Sincere"
      members: ["Melanie", "Sincere"]
    - canonical: "Trinity & Bryce"
      members: ["Trinity", "Bryce"]
    - canonical: "Kayda & Zach"
      members: ["Kayda", "Zach"]
    # — Love-triangle tensions / joke ships fans discuss —
    - canonical: "Sol & Sincere"
      members: ["Sol", "Sincere"]
    - canonical: "Caleb & Kenzie"
      members: ["Caleb", "Kenzie"]
    - canonical: "Zach & Bryce"
      members: ["Zach", "Bryce"]
      aliases: ["Zryce"]

# ------------------------------------------------------------
#  SEASON CONTEXT — free text fed to the scoring model so it
#  understands references, drama, and who's with whom.
# ------------------------------------------------------------
context: >
  Season 8 of Love Island USA. Established couples: Aniya & KC, Beatriz (Bea) &
  Gabriel, Kenzie & Corbin, Melanie (Mel) & Sincere, Trinity & Bryce, Kayda &
  Zach. Bombshells who entered after the start: girls Kayda, Jen, Sol; boys
  Gabriel, Corbin, Caleb. Jen, Sol, and Caleb are currently single (Jen, Sol,
  and Caleb entered as bombshells about two episodes ago). Sean (a boy) was
  dumped and has left the villa. Ongoing tensions / love triangles fans talk
  about: Sol and Sincere are into each other even though Sincere is coupled with
  Melanie; Caleb and Kenzie are into each other even though Kenzie is coupled
  with Corbin. Gabriel is known for making out with many people. Zach and Bryce
  are sometimes jokingly shipped as "Zryce" even though both are guys.

# General show keywords.
keywords:
  - "Love Island USA"
  - "LoveIslandUSA"
  - "#LoveIslandUSA"

# ------------------------------------------------------------
#  YOUTUBE — recap / reaction videos to read comments from.
#  Caps kept modest so each run stays fast and cheap; raise once
#  you're comfortable. (Re-runs skip already-seen comments.)
# ------------------------------------------------------------
youtube:
  search_terms:
    - "Love Island USA season 8 recap"
    - "Love Island USA reaction"
  channels: []                 # optional: specific channel IDs
  max_videos: 8                # kept modest for the $5 budget; raise anytime
  max_comments_per_video: 60

# ------------------------------------------------------------
#  GDELT NEWS — query terms (no API key needed).
# ------------------------------------------------------------
gdelt:
  query_terms:
    - "Love Island USA"
    - "Love Island"
  max_records: 100

# ------------------------------------------------------------
#  BLUESKY — public posts via search (needs BLUESKY_HANDLE +
#  BLUESKY_APP_PASSWORD in .env). Add contestant names to widen reach.
# ------------------------------------------------------------
bluesky:
  queries:
    - "love island usa"
    - "#loveislandusa"
  max_per_query: 200

# ------------------------------------------------------------
#  TUMBLR — posts under these tags (needs TUMBLR_API_KEY in .env).
#  Tumblr is big Love Island fandom territory; add contestant tags too.
# ------------------------------------------------------------
tumblr:
  tags:
    - "love island usa"
    - "loveislandusa"
  max_per_tag: 200

# ------------------------------------------------------------
#  REDDIT — used only once your Reddit API access is approved.
# ------------------------------------------------------------
reddit:
  subreddits:
    - "LoveIslandUSA"
  max_posts: 100
  max_comments_per_post: 200

# ------------------------------------------------------------
#  AIR SCHEDULE (US Eastern). Episodes air Sun/Mon/Tue/Thu/Fri
#  ~9pm. Saturday is the "Aftersun"-style talk show (not counted).
#  Used to time scheduled collection runs around new episodes.
# ------------------------------------------------------------
schedule:
  timezone: "America/New_York"
  air_nights: ["Sun", "Mon", "Tue", "Thu", "Fri"]
  air_time: "21:00"

# EPISODES — add air dates here to tag comments to a specific episode.
# (Optional. Time-over-time tracking works without this.)
episodes: []
  # - number: 1
  #   air_date: "2026-06-01T21:00:00-04:00"
  #   window_hours: 24

# ------------------------------------------------------------
#  SENTIMENT scoring settings.
# ------------------------------------------------------------
sentiment:
  model: "claude-haiku-4-5"    # fast + inexpensive
  batch_size: 20               # comments scored per API call
